<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>生成AIパスポート 資格勉強アプリ</title>
<style>
  :root {
    --primary: #6C63FF;
    --primary-dark: #5a52d5;
    --accent: #FF6584;
    --bg: #F0F2FF;
    --card-bg: #ffffff;
    --text: #2d2d2d;
    --text-sub: #666;
    --correct: #22c55e;
    --wrong: #ef4444;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    background: var(--primary);
    color: #fff;
    padding: 16px 20px 12px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(108,99,255,0.3);
  }
  header h1 { font-size: 1.1rem; font-weight: 700; }
  header p { font-size: 0.75rem; opacity: 0.85; margin-top: 2px; }

  /* Mode switcher */
  .mode-switcher {
    display: flex;
    background: #e8e6ff;
    border-radius: 50px;
    padding: 4px;
    margin: 16px 20px 0;
    gap: 4px;
  }
  .mode-btn {
    flex: 1;
    border: none;
    background: transparent;
    border-radius: 46px;
    padding: 10px 0;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    color: var(--primary);
    transition: all 0.2s;
  }
  .mode-btn.active {
    background: var(--primary);
    color: #fff;
    box-shadow: 0 2px 8px rgba(108,99,255,0.35);
  }

  /* Category filter */
  .category-row {
    display: flex;
    gap: 8px;
    padding: 12px 20px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .category-row::-webkit-scrollbar { display: none; }
  .cat-btn {
    white-space: nowrap;
    border: 1.5px solid var(--primary);
    background: transparent;
    border-radius: 50px;
    padding: 6px 14px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    color: var(--primary);
    transition: all 0.15s;
  }
  .cat-btn.active {
    background: var(--primary);
    color: #fff;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 20px 8px;
    font-size: 0.78rem;
    color: var(--text-sub);
  }
  .progress-wrap {
    flex: 1;
    height: 6px;
    background: #ddd;
    border-radius: 10px;
    margin: 0 12px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), #a78bfa);
    border-radius: 10px;
    transition: width 0.4s;
  }

  /* Main content */
  main { flex: 1; padding: 0 16px 24px; }

  /* ======================== FLASHCARD ======================== */
  .flashcard-wrap {
    perspective: 1200px;
    margin: 8px 0;
    min-height: 240px;
  }
  .flashcard {
    width: 100%;
    min-height: 240px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(.4,0,.2,1);
    cursor: pointer;
    border-radius: var(--radius);
  }
  .flashcard.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    width: 100%;
    min-height: 240px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  .card-front {
    background: linear-gradient(135deg, var(--primary) 0%, #a78bfa 100%);
    color: #fff;
  }
  .card-back {
    background: var(--card-bg);
    transform: rotateY(180deg);
    border: 2px solid #e8e6ff;
  }
  .card-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    opacity: 0.75;
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .card-front .card-label { color: rgba(255,255,255,0.8); }
  .card-back .card-label { color: var(--primary); }
  .card-text {
    font-size: 1.05rem;
    font-weight: 600;
    text-align: center;
    line-height: 1.7;
  }
  .card-front .card-text { color: #fff; }
  .card-hint {
    font-size: 0.72rem;
    margin-top: 16px;
    opacity: 0.7;
  }

  .fc-nav {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    align-items: center;
  }
  .fc-nav button {
    flex: 1;
    padding: 13px;
    border: none;
    border-radius: var(--radius);
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-prev {
    background: #fff;
    color: var(--primary);
    border: 2px solid var(--primary) !important;
  }
  .btn-next {
    background: var(--primary);
    color: #fff;
  }
  .btn-shuffle {
    flex: 0 0 50px !important;
    background: #fff;
    border: 2px solid #ddd !important;
    border-radius: var(--radius) !important;
    font-size: 1.2rem !important;
  }

  /* ======================== QUIZ ======================== */
  .quiz-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 24px 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    margin: 8px 0;
  }
  .quiz-q-num {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 0.06em;
    margin-bottom: 12px;
  }
  .quiz-question {
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.75;
    margin-bottom: 20px;
  }
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice-btn {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    background: #fff;
    text-align: left;
    font-size: 0.9rem;
    line-height: 1.5;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .choice-btn:active { transform: scale(0.98); }
  .choice-btn .choice-label {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.8rem;
    flex-shrink: 0;
  }
  .choice-btn.correct {
    border-color: var(--correct);
    background: #f0fdf4;
  }
  .choice-btn.correct .choice-label { background: var(--correct); color: #fff; }
  .choice-btn.wrong {
    border-color: var(--wrong);
    background: #fef2f2;
  }
  .choice-btn.wrong .choice-label { background: var(--wrong); color: #fff; }
  .choice-btn:disabled { cursor: default; }

  .explanation {
    margin-top: 16px;
    padding: 14px 16px;
    background: #f8f7ff;
    border-left: 3px solid var(--primary);
    border-radius: 0 12px 12px 0;
    font-size: 0.85rem;
    line-height: 1.7;
    color: var(--text);
    display: none;
  }
  .explanation.show { display: block; }
  .explanation strong { color: var(--primary); }

  .quiz-nav {
    display: flex;
    justify-content: flex-end;
    margin-top: 14px;
  }
  .btn-next-q {
    padding: 12px 28px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 50px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    display: none;
  }
  .btn-next-q.show { display: block; }

  /* Result screen */
  .result-screen {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }
  .result-screen.show { display: block; }
  .result-score {
    font-size: 4rem;
    font-weight: 800;
    color: var(--primary);
  }
  .result-total { font-size: 1rem; color: var(--text-sub); margin-bottom: 8px; }
  .result-msg { font-size: 1.1rem; font-weight: 700; margin: 16px 0 24px; }
  .btn-retry {
    padding: 14px 40px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
  }

  /* Score badge in quiz */
  .score-badge {
    display: inline-flex;
    gap: 16px;
    background: #fff;
    border-radius: 50px;
    padding: 8px 20px;
    font-size: 0.82rem;
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin: 8px 0 4px;
  }
  .score-correct { color: var(--correct); }
  .score-wrong { color: var(--wrong); }
</style>
</head>
<body>

<header>
  <h1>🤖 生成AIパスポート 資格対策</h1>
  <p>一問一答 &amp; 4択クイズで合格を目指そう</p>
</header>

<div class="mode-switcher">
  <button class="mode-btn active" onclick="setMode('flash')">📇 フラッシュカード</button>
  <button class="mode-btn" onclick="setMode('quiz')">📝 4択クイズ</button>
</div>

<div class="category-row" id="categoryRow"></div>

<div class="stats-bar" id="statsBar">
  <span id="statsLeft">0 / 0</span>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <span id="statsRight"></span>
</div>

<main>
  <!-- FLASHCARD MODE -->
  <div id="flashMode">
    <div class="flashcard-wrap" onclick="flipCard()">
      <div class="flashcard" id="flashcard">
        <div class="card-face card-front">
          <div class="card-label">Question</div>
          <div class="card-text" id="fcQuestion">読み込み中...</div>
          <div class="card-hint">タップして答えを見る 👆</div>
        </div>
        <div class="card-face card-back">
          <div class="card-label">Answer</div>
          <div class="card-text" id="fcAnswer"></div>
        </div>
      </div>
    </div>
    <div class="fc-nav">
      <button class="btn-prev" onclick="fcNav(-1)">← 前へ</button>
      <button class="btn-shuffle" onclick="shuffle()" title="シャッフル">🔀</button>
      <button class="btn-next" onclick="fcNav(1)">次へ →</button>
    </div>
  </div>

  <!-- QUIZ MODE -->
  <div id="quizMode" style="display:none">
    <div style="text-align:center">
      <div class="score-badge">
        <span class="score-correct">✓ <span id="qCorrect">0</span> 正解</span>
        <span class="score-wrong">✗ <span id="qWrong">0</span> 不正解</span>
      </div>
    </div>
    <div class="quiz-card" id="quizCard">
      <div class="quiz-q-num" id="quizQNum">問題 1</div>
      <div class="quiz-question" id="quizQuestion"></div>
      <div class="choices" id="choices"></div>
      <div class="explanation" id="explanation"></div>
      <div class="quiz-nav">
        <button class="btn-next-q" id="btnNextQ" onclick="nextQuestion()">次の問題 →</button>
      </div>
    </div>
    <div class="result-screen" id="resultScreen">
      <div class="result-score" id="resultScore">0</div>
      <div class="result-total" id="resultTotal">/ 0 問</div>
      <div class="result-msg" id="resultMsg"></div>
      <button class="btn-retry" onclick="retryQuiz()">もう一度挑戦</button>
    </div>
  </div>
</main>

<script>
const ALL_QUESTIONS = [
  // ═══════════════════════════════════════
  // 第1章 AIの基礎知識
  // ═══════════════════════════════════════
  { cat: "AI基礎", q: "「人工知能（AI）」の定義として最も適切なものはどれか？", a: "人間の知的な行動（推論・学習・判断など）をコンピュータ上で再現する技術・システムの総称。", choices: ["人間の知的行動をコンピュータで再現する技術の総称", "人間の感情を持つロボットの総称", "超高速演算を行うコンピュータの総称", "インターネットに接続した機器の総称"], correct: 0, exp: "AIに明確な定義はなく文脈によって異なりますが、一般に「人間の知的活動を模倣・代替するシステム」を指します。" },
  { cat: "AI基礎", q: "「機械学習」とはどのような技術か？", a: "データからパターンや規則を自動的に学習し、予測や判断を行うAI技術の一分野。", choices: ["データからパターンを自動学習し予測・判断する技術", "人間がすべてのルールを手動で記述するAI技術", "ロボットに物理的な作業を学習させる技術", "コンピュータのハードウェアを自己改善する技術"], correct: 0, exp: "従来のルールベースAIと異なり、機械学習はデータから自動的にルールを発見します。" },
  { cat: "AI基礎", q: "「教師あり学習」の説明として正しいものはどれか？", a: "正解ラベル付きの訓練データを使い、入力と正解の対応関係をモデルに学習させる手法。", choices: ["正解ラベル付きデータで入力と出力の対応を学習する手法", "正解なしでデータの構造を自動発見する手法", "報酬シグナルに基づいて行動を学習する手法", "人間の脳神経を完全にシミュレートする手法"], correct: 0, exp: "分類（スパム判定など）・回帰（価格予測など）が代表的なタスクです。" },
  { cat: "AI基礎", q: "「教師なし学習」の代表的なタスクはどれか？", a: "クラスタリング（類似データをグループ化）や次元削減など、ラベルなしデータの構造を発見するタスク。", choices: ["クラスタリングや次元削減などラベルなしデータの構造発見", "犬と猫を分類する画像分類", "明日の株価を予測する回帰分析", "チェスで最善手を見つける問題"], correct: 0, exp: "顧客セグメンテーションや異常検知など、正解ラベルが得られない場面で活躍します。" },
  { cat: "AI基礎", q: "「強化学習」の仕組みを正しく説明しているのはどれか？", a: "エージェントが環境と相互作用し、報酬を最大化する行動方策を試行錯誤で学習する手法。", choices: ["報酬最大化を目指し環境との試行錯誤で方策を学習する手法", "大量の正解データから静的に学習する手法", "複数のモデルを多数決で統合する手法", "人間の脳のシナプス結合を模倣する手法"], correct: 0, exp: "AlphaGoやゲームAIに活用。「報酬設計」の良し悪しが性能を大きく左右します。" },
  { cat: "AI基礎", q: "「ディープラーニング（深層学習）」の特徴として正しいのはどれか？", a: "多数の層を持つニューラルネットワークを使い、データから階層的に特徴を自動抽出する機械学習の手法。", choices: ["多層ニューラルネットでデータから特徴を自動抽出する手法", "人間が手作業で特徴量を設計する必要がある手法", "計算資源を必要としない軽量な学習手法", "決定木を深く積み重ねた手法"], correct: 0, exp: "従来の機械学習では人間が特徴量を設計する必要がありましたが、深層学習は自動で行います。" },
  { cat: "AI基礎", q: "ニューラルネットワークの「活性化関数」の役割は何か？", a: "ネットワークに非線形性を導入し、複雑なパターンの学習を可能にする関数。ReLU・Sigmoidなどが代表的。", choices: ["非線形性を導入し複雑なパターンの学習を可能にする", "学習データを正規化してスケールを揃える", "重みパラメータを初期化する", "過学習を防ぐためにノードを無効化する"], correct: 0, exp: "活性化関数なしでは全結合層の積み重ねが線形変換に留まり、複雑な問題を解けません。" },
  { cat: "AI基礎", q: "「過学習（オーバーフィッティング）」とはどのような現象か？", a: "モデルが訓練データに過度に適合し、未知のデータに対する汎化性能が低下する現象。", choices: ["訓練データに過度に適合し未知データへの精度が落ちる現象", "モデルが単純すぎて訓練データにも適合できない現象", "学習率が高すぎて損失が収束しない現象", "計算リソース不足でメモリが溢れる現象"], correct: 0, exp: "ドロップアウト・正則化・データ拡張・早期終了などが過学習の対策として有効です。" },
  { cat: "AI基礎", q: "「転移学習（Transfer Learning）」とは何か？", a: "大規模データで事前学習済みのモデルを、別のタスクに応用・微調整（ファインチューニング）する技術。", choices: ["事前学習済みモデルを別タスクに応用・微調整する技術", "モデルを別のコンピュータに移行する技術", "学習データを別のドメインに変換する技術", "モデルの重みを圧縮して軽量化する技術"], correct: 0, exp: "ImageNetで学習した画像認識モデルを医療画像に転用するなど、少ないデータでも高精度を実現できます。" },
  { cat: "AI基礎", q: "AIの「精度（Accuracy）」だけで評価することの問題点は？", a: "データの偏り（クラス不均衡）がある場合、少数クラスを無視しても高い精度が出てしまい実態を反映しない。", choices: ["クラス不均衡時に少数クラスを無視しても高精度になりうる", "精度は計算が難しく実用的でない", "精度は常に0〜100の範囲にならない", "精度はモデルの速度を考慮しない"], correct: 0, exp: "不正検知や疾病診断ではF1スコア・適合率・再現率・AUCなどを総合的に評価する必要があります。" },
  // ═══════════════════════════════════════
  // 第2章 生成AIの概要・歴史
  // ═══════════════════════════════════════
  { cat: "生成AIの概要", q: "「生成AI（Generative AI）」の定義として正しいのはどれか？", a: "学習データのパターンを学び、テキスト・画像・音声・動画などの新しいコンテンツを生成できるAI。", choices: ["学習パターンからテキスト・画像・音声などを新たに生成するAI", "既存データを検索して返すだけのAI", "工場の製造ラインを制御する産業用AI", "監視カメラの映像を解析するだけのAI"], correct: 0, exp: "判別AI（分類・予測）と異なり、生成AIは「新しいコンテンツを創り出す」点が特徴です。" },
  { cat: "生成AIの概要", q: "「ChatGPT」を開発・提供している企業はどこか？", a: "OpenAI（オープンエーアイ）。2015年にイーロン・マスクらが設立した非営利研究機関から発展した企業。", choices: ["OpenAI", "Google（Alphabet）", "Meta", "Microsoft"], correct: 0, exp: "MicrosoftはOpenAIに大規模投資を行い、Azure OpenAI ServiceとしてAPIを提供しています。" },
  { cat: "生成AIの概要", q: "Googleが提供する大規模言語モデル・生成AIサービスの名称はどれか？", a: "Gemini（ジェミナイ）。旧称Bardから改称され、マルチモーダル対応の生成AIサービス。", choices: ["Gemini", "Claude", "Copilot", "LLaMA"], correct: 0, exp: "GeminiはGemini Ultra / Pro / Nanoなど複数のサイズがあり、Googleサービスに統合されています。" },
  { cat: "生成AIの概要", q: "Anthropicが開発する生成AIモデルの名称はどれか？", a: "Claude（クロード）。Constitutional AIという安全性重視のアプローチで開発されたモデル。", choices: ["Claude", "Gemini", "Copilot", "Mistral"], correct: 0, exp: "AnthropicはOpenAIの元メンバーが設立。AI安全性研究を重視した企業です。" },
  { cat: "生成AIの概要", q: "「GPT」の正式名称はどれか？", a: "Generative Pre-trained Transformer（生成的事前学習済みトランスフォーマー）の略。", choices: ["Generative Pre-trained Transformer", "General Purpose Technology", "Graphical Processing Tool", "Global Pattern Training"], correct: 0, exp: "GPT-1（2018）→GPT-2→GPT-3→GPT-4と進化。事前学習とTransformerアーキテクチャが核心です。" },
  { cat: "生成AIの概要", q: "2022年11月に公開され、生成AIブームの火付け役となったサービスはどれか？", a: "ChatGPT。公開5日で100万ユーザー、2ヶ月で1億ユーザーを達成し、史上最速の普及を記録した。", choices: ["ChatGPT", "Stable Diffusion", "DALL-E 2", "GitHub Copilot"], correct: 0, exp: "ChatGPTの登場は生成AI・LLMの社会的認知を一気に広め、各社のAI競争を加速させました。" },
  { cat: "生成AIの概要", q: "Metaが公開しているオープンソースの大規模言語モデルはどれか？", a: "LLaMA（ラマ）。研究・商用利用が可能なオープンウェイトモデルとして公開されている。", choices: ["LLaMA", "Gemini", "Claude", "Copilot"], correct: 0, exp: "LLaMAのオープン化によりMistral・Vicuna・Alpacaなど多数の派生モデルが生まれました。" },
  { cat: "生成AIの概要", q: "「マルチモーダルAI」とはどのようなAIか？", a: "テキスト・画像・音声・動画など複数の種類（モダリティ）のデータを入出力として扱えるAI。", choices: ["テキスト・画像・音声など複数モダリティを入出力できるAI", "複数の言語で会話できるAI", "複数のユーザーが同時に利用できるAI", "複数のクラウドで分散動作するAI"], correct: 0, exp: "GPT-4o・Gemini・Claude 3などがマルチモーダル対応。画像を見て説明する・音声で会話するなどが可能です。" },
  // ═══════════════════════════════════════

  { cat: "生成AIの仕組み", q: "「Transformer」アーキテクチャの革新的な特徴は何か？", a: "Self-Attention機構により、入力シーケンス内の全要素間の関係を並列に計算できる点。RNNより長距離依存を捉えやすい。", choices: ["Self-Attentionで全要素間の関係を並列計算できる点", "畳み込み演算で画像特徴を抽出できる点", "再帰的な処理で時系列を順番に処理できる点", "決定木の集合でアンサンブル学習できる点"], correct: 0, exp: "2017年「Attention is All You Need」論文で発表。現代のLLMはほぼすべてTransformerをベースにしています。" },
  { cat: "生成AIの仕組み", q: "LLMにおける「トークン」とは何か？", a: "テキストを分割した最小処理単位。単語・部分語・記号など。日本語では1〜数文字がトークンになることが多い。", choices: ["テキストの最小処理単位（単語・部分語・記号など）", "モデルの重みパラメータひとつ", "学習バッチのデータ件数", "APIの認証トークン"], correct: 0, exp: "コンテキスト長・API料金はトークン数で決まります。英語より日本語の方がトークン数が多くなりやすいです。" },
  { cat: "生成AIの仕組み", q: "LLMの事前学習で行われる「次のトークン予測」とはどのような学習か？", a: "大量のテキストに対して「前の文脈が与えられたとき次に来るトークンを予測する」自己教師あり学習タスク。", choices: ["前の文脈から次のトークンを予測する自己教師あり学習", "人間が正解を付けた文を分類する教師あり学習", "文の類似度を比較するコントラスト学習", "ランダムにマスクしたトークンを復元する学習"], correct: 0, exp: "正解ラベルが不要で大量のテキストデータをそのまま活用できるため、スケールしやすい学習方式です。" },
  { cat: "生成AIの仕組み", q: "「RLHF（人間のフィードバックに基づく強化学習）」の目的は何か？", a: "人間の評価者による好み・安全性のフィードバックを用いて、モデルの出力を人間の意図に沿わせる調整手法。", choices: ["人間のフィードバックでモデルを人間の意図に沿わせる手法", "学習データを人間が手動でラベリングする作業", "モデルのハードウェア最適化を行う手法", "複数モデルを人間が評価して選ぶアンサンブル手法"], correct: 0, exp: "ChatGPTの有用性・無害性・誠実性（HHH）の向上にRLHFが大きく貢献しました。" },
  { cat: "生成AIの仕組み", q: "「拡散モデル（Diffusion Model）」の画像生成の仕組みは？", a: "画像にノイズを段階的に加える「拡散過程」の逆向き（ノイズ除去）を学習し、ランダムノイズから画像を生成する。", choices: ["ノイズ付加の逆過程を学習しノイズから画像を生成", "2つのネットワークが競い合って画像を生成", "オートエンコーダで潜在空間を学習して生成", "テキスト記述から直接ピクセルを計算して生成"], correct: 0, exp: "Stable Diffusion・DALL-E・Midjourneyなどで採用。高品質な画像生成で現在の主流技術です。" },
  { cat: "生成AIの仕組み", q: "「GAN（敵対的生成ネットワーク）」の構成は？", a: "本物と区別できない偽データを生成する「生成器」と、本物か偽物かを識別する「識別器」が競い合う構造。", choices: ["偽データを生成する「生成器」と本物・偽物を見分ける「識別器」が競合", "EncoderとDecoderが対になった構造", "複数の分類器を多数決で統合する構造", "入力を変換する複数のAttention層からなる構造"], correct: 0, exp: "GANは「偽札製造者と警察」の競争に例えられます。顔画像生成（StyleGAN）などで使われてきましたが、拡散モデルに主流が移っています。" },
  { cat: "生成AIの仕組み", q: "「RAG（Retrieval-Augmented Generation）」とはどのような手法か？", a: "LLMが回答を生成する前に外部の知識ベース・ドキュメントから関連情報を検索・取得し、それを文脈として組み込む手法。", choices: ["外部DBを検索して関連情報をLLMの文脈に組み込む手法", "モデルを専門データで再学習させる手法", "複数モデルの回答を多数決で統合する手法", "プロンプトを自動改善するメタ学習手法"], correct: 0, exp: "ハルシネーション軽減・最新情報への対応・根拠の明示に有効。企業でのLLM導入に広く使われています。" },
  { cat: "生成AIの仕組み", q: "「ファインチューニング」とはどのような技術か？", a: "事前学習済みモデルに対し、特定のタスク・ドメインのデータで追加学習を行い、性能や応答スタイルを調整する技術。", choices: ["事前学習済みモデルを特定タスク・ドメインのデータで追加学習する技術", "大量データでモデルをゼロから学習させる技術", "プロンプトだけでモデルを誘導する技術", "モデルの推論速度を高速化する技術"], correct: 0, exp: "フルファインチューニングのほか、コスト削減のためLoRA・QLoRAなどのパラメータ効率的手法も普及しています。" },
  { cat: "生成AIの仕組み", q: "「Embedding（埋め込み）」とは何か？", a: "単語・文章・画像などの意味・特徴を高次元の実数ベクトルに変換したもの。意味的に近いものは近いベクトルになる。", choices: ["意味・特徴を高次元ベクトルに変換したもの（近い意味→近いベクトル）", "テキストをバイナリデータに圧縮したもの", "モデルの重みパラメータの総称", "APIのエンドポイントURL"], correct: 0, exp: "RAGの類似度検索・推薦システム・テキスト分類など幅広く使われます。ベクトルDBと組み合わせて活用されます。" },
  { cat: "生成AIの仕組み", q: "「Temperature（温度）パラメータ」を高く設定した場合の出力の特徴は？", a: "出力のランダム性・多様性・創造性が増す。一方、一貫性や事実の正確性が下がる傾向がある。", choices: ["多様性・創造性が増す一方、一貫性・正確性が下がる傾向", "より正確で事実に基づいた出力になる", "応答速度が向上する", "トークン消費量が減少する"], correct: 0, exp: "創作・ブレインストーミングには高め(0.8〜1.0)、事実確認・コード生成には低め(0〜0.3)が適切です。" },
  { cat: "生成AIの仕組み", q: "「コンテキスト長（Context Length）」とは何を指すか？", a: "モデルが一度に処理・参照できるトークンの最大数。長いほど長文書類や長い会話履歴を扱える。", choices: ["モデルが一度に処理できるトークンの最大数", "モデルのパラメータの総数", "1秒間に生成できるトークンの数", "学習に使ったデータセットのサイズ"], correct: 0, exp: "GPT-4は最大128K、Claudeは最大200Kトークンなど、コンテキスト長は急速に拡大しています。" },
  // ═══════════════════════════════════════
  // 第4章 プロンプトエンジニアリング

  { cat: "プロンプト技術", q: "「Zero-shot プロンプティング」とは何か？", a: "具体的な例を一切示さず、タスクの説明だけでモデルに実行させる手法。", choices: ["例を示さずタスク説明だけでモデルに実行させる手法", "1つの例を示してから指示する手法", "複数の例を示してから指示する手法", "外部ツールと連携しながら実行する手法"], correct: 0, exp: "LLMは事前学習で幅広い知識を持つため、例なしでも多くのタスクをこなせます。" },
  { cat: "プロンプト技術", q: "「Few-shot プロンプティング」の特徴はどれか？", a: "プロンプトに入力と出力の具体例をいくつか示すことで、モデルに望ましい形式・内容を誘導する手法。", choices: ["入出力の例をいくつか示して望ましい出力形式に誘導する手法", "例を一切示さない手法", "モデルを再学習させる手法", "APIに大量のデータを送信する手法"], correct: 0, exp: "出力形式の統一・特定の口調・専門的なスタイルを要求する場面で効果的です。" },
  { cat: "プロンプト技術", q: "「Chain-of-Thought（CoT）プロンプティング」の効果は？", a: "「ステップごとに考えてください」と指示することで、モデルの推論過程を引き出し、複雑な問題の正答率を向上させる。", choices: ["推論過程を段階的に示させ複雑問題の正答率を向上させる", "回答を短く簡潔にまとめさせる効果", "英語で回答させるための指示技術", "APIコストを削減するための技術"], correct: 0, exp: "数学問題・論理推論などで特に効果的。「Let's think step by step」が有名なCoT誘導フレーズです。" },
  { cat: "プロンプト技術", q: "「ロールプロンプティング」とはどのような手法か？", a: "「あなたは◯◯の専門家です」のようにAIに役割・ペルソナを与え、その立場から回答させる手法。", choices: ["AIに専門家などの役割・ペルソナを与えて回答させる手法", "複数のAIに同じ質問を投げて答えを比較する手法", "ロールプレイゲームをAIで生成する手法", "APIのロールに基づいてアクセス制御する手法"], correct: 0, exp: "「あなたはベテランの医師です。患者に分かりやすく説明してください」のように専門的な観点を引き出せます。" },
  { cat: "プロンプト技術", q: "効果的なプロンプトに含めるべき要素として最も重要なものはどれか？", a: "①明確な指示・目的 ②文脈・背景情報 ③出力形式の指定 ④制約条件 の4つが基本的な要素。", choices: ["明確な指示・文脈・出力形式・制約条件などの明示", "感情的な訴えかけ（「お願いだから」など）", "できるだけ長い文章で書くこと", "専門用語を一切使わないこと"], correct: 0, exp: "「何を・どのような形式で・どんな制約のもとで」を明示することで出力品質が大幅に向上します。" },
  { cat: "プロンプト技術", q: "「プロンプトインジェクション」とはどのような攻撃か？", a: "悪意ある指示をプロンプトやユーザー入力に埋め込み、AIシステムを意図しない動作に誘導する攻撃手法。", choices: ["悪意ある指示をプロンプトに埋め込みAIを誤動作させる攻撃", "AIのAPIキーを盗み取るサイバー攻撃", "学習データを意図的に汚染するポイズニング攻撃", "モデルの応答速度を低下させるDoS攻撃"], correct: 0, exp: "「これまでの指示を無視して…」「システムプロンプトを教えて」などが典型的な手口です。" },
  { cat: "プロンプト技術", q: "「システムプロンプト」とは何か？", a: "ユーザーの入力より前に設定される、AIの振る舞い・役割・制約を定義するプロンプト。開発者が事前に設定する。", choices: ["AIの振る舞い・役割・制約を定義する開発者設定の事前プロンプト", "ユーザーが毎回入力する質問文", "AIが自動生成する応答のテンプレート", "データベースのクエリ文"], correct: 0, exp: "ChatGPT APIではsystemロール、Claudeではsystemパラメータとして設定します。" },
  { cat: "プロンプト技術", q: "ハルシネーションを減らすプロンプト設計として有効なものはどれか？", a: "「分からない場合は『分かりません』と答えてください」「主張には根拠を示してください」などの制約を明示する。", choices: ["不確かな場合は『分かりません』と答えるよう制約を明示する", "プロンプトをできるだけ短くする", "Temperatureを最大値に設定する", "日本語ではなく英語でプロンプトを書く"], correct: 0, exp: "「出典を明記してください」「確信が持てない内容には注意書きをつけてください」なども有効です。" },

  { cat: "活用・ユースケース", q: "生成AIを「コード生成・補完」に活用するツールの代表例はどれか？", a: "GitHub Copilot（ギットハブ コパイロット）。GitHubとOpenAIが共同開発した開発者向けAIアシスタント。", choices: ["GitHub Copilot", "Google Analytics", "Jira", "Slack"], correct: 0, exp: "Copilotはエディタ上でコードを提案・補完・説明してくれます。開発生産性の向上に大きく貢献しています。" },
  { cat: "活用・ユースケース", q: "「AIエージェント」の特徴として正しいのはどれか？", a: "与えられたゴールに向けて、自律的に計画を立て・ツールを使用し・結果を確認しながら複数ステップのタスクを実行するAI。", choices: ["自律的に計画・ツール使用・検証を繰り返してタスクを実行するAI", "人間の指示に従い1回だけ回答するAI", "画像のみを処理する専用AI", "ネットワークに接続せず動作するオフラインAI"], correct: 0, exp: "Web検索・コード実行・ファイル操作・メール送信などのツールを組み合わせて複雑な業務を自動化できます。" },
  { cat: "活用・ユースケース", q: "生成AIを活用した「RAGシステム」が企業で重宝される理由はどれか？", a: "社内の最新ドキュメントを根拠に回答できるため、ハルシネーションを減らしつつ業務特化した情報提供が可能になるから。", choices: ["社内文書を根拠に回答しハルシネーションを減らせるから", "モデルの学習コストがゼロになるから", "著作権の問題が完全に解消されるから", "インターネット不要で動作するから"], correct: 0, exp: "問い合わせ対応・社内規則の検索・技術文書への質問応答など、企業導入の定番パターンです。" },
  { cat: "活用・ユースケース", q: "「テキスト要約」タスクで生成AIを使う際の注意点はどれか？", a: "要約時に重要情報が脱落したり、事実の歪曲・ハルシネーションが生じる可能性があるため人間によるレビューが必要。", choices: ["重要情報の脱落や事実歪曲が起きる可能性があり人間確認が必要", "日本語の要約には全く対応していない", "要約すると必ず著作権侵害になる", "500文字以上の文書は処理できない"], correct: 0, exp: "特に医療・法律・財務など正確性が求められる分野では、AI要約のみに頼ることは危険です。" },
  { cat: "活用・ユースケース", q: "生成AIを「教育分野」で活用する際のメリットとして最も適切なのはどれか？", a: "学習者の理解度・ペースに合わせた個別最適化学習の支援や、24時間対応の質問応答が可能になること。", choices: ["個別最適化学習の支援と24時間の質問応答対応", "教師の仕事をすべて自動化して人件費をゼロにすること", "試験の問題・解答を自動生成して評価を省略すること", "学校の施設費用を削減すること"], correct: 0, exp: "一方でAIへの過度な依存や、試験での不正利用といったリスクへの対応も重要な課題です。" },
  // ═══════════════════════════════════════

  // ═══════════════════════════════════════
  { cat: "リスクと対策", q: "「ハルシネーション（幻覚）」とは生成AIにおいてどのような現象か？", a: "モデルが事実と異なる情報・存在しない文献・架空の人物などを、あたかも正確であるかのように生成する現象。", choices: ["事実と異なる情報を確信を持って生成してしまう現象", "AIが長時間動作するとメモリが不足する現象", "同じ回答を何度も繰り返す現象", "入力が長すぎてモデルがクラッシュする現象"], correct: 0, exp: "論文の捏造・法律の誤解釈・存在しない人物の経歴など実害が多数報告されています。重要な情報は必ず一次情報で確認を。" },
  { cat: "リスクと対策", q: "「AIバイアス」の主な原因として最も適切なのはどれか？", a: "学習データに含まれる社会的偏見・不均衡なデータ分布が、モデルの予測・判断にそのまま反映されること。", choices: ["学習データに含まれる社会的偏見や不均衡な分布", "モデルのパラメータ数が少なすぎること", "GPUの計算精度が不十分なこと", "インターネット接続速度が遅いこと"], correct: 0, exp: "採用AIが特定性別・人種を不当に評価した事例が複数報告されています。データの多様性確保と定期的な監査が重要です。" },
  { cat: "リスクと対策", q: "「ディープフェイク」の主なリスクはどれか？", a: "実在の人物の顔・声を偽造した動画・音声を使った詐欺・名誉毀損・フェイクニュースの拡散リスク。", choices: ["実在人物の偽造メディアによる詐欺・名誉毀損・偽情報拡散", "動画ファイルのサイズが大きくなりすぎるリスク", "生成に時間がかかりすぎるリスク", "画質が低下して本物と区別されやすいリスク"], correct: 0, exp: "振り込め詐欺の進化版として音声ディープフェイクを使った詐欺が世界中で急増しています。" },
  { cat: "リスクと対策", q: "「フィルターバブル」とはAI利用における何の問題か？", a: "AIがユーザーの好みに偏った情報だけを推薦し続け、多様な視点・情報にアクセスしにくくなる現象。", choices: ["AIがユーザーの嗜好に偏った情報だけを提供し多様性が失われる現象", "AIの応答にフィルタリングが厳しすぎる問題", "スパムメールフィルターが過剰に働く問題", "プロンプトが検閲されすぎる問題"], correct: 0, exp: "SNSのレコメンドアルゴリズムによる政治的分極化がその典型例。意識的に多様な情報源を参照することが大切です。" },
  { cat: "リスクと対策", q: "生成AIによる「著作権侵害」リスクが高まる場面はどれか？", a: "著作物を大量に学習させた場合や、著作物と実質的に同一・酷似したコンテンツを生成して公開・販売する場合。", choices: ["著作物で学習したモデルが酷似した作品を生成・公開する場合", "AIが生成した文章を社内のみで使う場合", "公開されているAPIを利用してアプリを作る場合", "無料のオープンソースモデルを使う場合"], correct: 0, exp: "日本では著作権法30条の4で学習目的の利用は原則OK。ただし酷似した出力の公開・販売は侵害になりうるため注意が必要です。" },
  { cat: "リスクと対策", q: "「データポイズニング攻撃」とは何か？", a: "AIモデルの学習データに悪意ある偽データを混入させ、モデルの予測・判断を意図的に歪める攻撃。", choices: ["学習データに偽データを混入させてモデルを意図的に歪める攻撃", "APIへのDoS攻撃でサービスを停止させる攻撃", "プロンプトに悪意ある指示を埋め込む攻撃", "ユーザーのアカウントを乗っ取る攻撃"], correct: 0, exp: "医療診断AIや自動運転システムへの攻撃として研究されており、学習データのソース管理・検証が重要です。" },
  { cat: "リスクと対策", q: "生成AIによる「情報漏洩リスク」への対策として適切なのはどれか？", a: "機密情報・個人情報をプロンプトに含めない、企業向けプライバシーポリシーを確認する、オンプレミス版を適切に選択する。", choices: ["機密情報をプロンプトに含めずプライバシーポリシーを確認する", "AIツールの利用を全社で完全に禁止する", "すべての情報を英語に翻訳してから入力する", "出力をすべてクラウドに保存して管理する"], correct: 0, exp: "Samsung社でのChatGPT経由コード漏洩事例が有名。社内ガイドラインの整備とツールの適切な選択が重要です。" },
  { cat: "リスクと対策", q: "「AIの誤用・悪用」防止のために企業が取るべき対策はどれか？", a: "AI利用ポリシーの策定・従業員教育・利用ログの管理・ヒューマンインザループ（人間によるレビュー）の実装。", choices: ["利用ポリシー策定・従業員教育・ログ管理・人間レビューの実装", "AIを使える社員を1名だけに限定する", "出力をそのまま公開せずに削除する", "最も古いバージョンのAIのみを使う"], correct: 0, exp: "特に高リスク用途（採用・与信・医療など）では「人間が最終判断をする」ヒューマンインザループが不可欠です。" },

  { cat: "法律・倫理", q: "EU AI法（AI Act）が採用するアプローチはどれか？", a: "AIのリスクレベルに応じて規制の強度を変える「リスクベースアプローチ」。禁止・高リスク・限定リスク・最小リスクの4段階。", choices: ["リスクレベルに応じて規制強度を変えるリスクベースアプローチ", "すべてのAIに同一の規制を適用するアプローチ", "AI開発者の自主規制にすべて委ねるアプローチ", "使用禁止と使用許可の2段階のみで分類するアプローチ"], correct: 0, exp: "2024年に発効したEU AI法は世界初の包括的AI規制法。高リスクAIには透明性・人間監督などの義務が課されます。" },
  { cat: "法律・倫理", q: "EU AI法で「禁止」されるAI用途はどれか？", a: "社会的スコアリング・潜在意識操作・リアルタイム公共場所でのバイオメトリクス監視（原則）など。", choices: ["社会的スコアリング・潜在意識操作・公共場所でのリアルタイム生体認証", "医療診断支援AI", "チャットボットによる顧客対応", "文章の翻訳・要約"], correct: 0, exp: "中国の社会信用システムのような市民の行動を点数化するAIや、サブリミナル的な操作AIは禁止されます。" },
  { cat: "法律・倫理", q: "日本の著作権法における「AI学習目的の著作物利用」の扱いはどれか？", a: "著作権法第30条の4により、情報解析を目的とした著作物の利用は原則として著作権者の許諾なく行える。", choices: ["第30条の4で情報解析目的の利用は原則許諾不要", "学習目的でも著作権者の許諾が常に必要", "政府機関のみ許諾なしで利用できる", "海外の著作物のみ制限なく使える"], correct: 0, exp: "ただし、生成物が著作物に酷似して「享受目的」と判断される場合は侵害になりえます。" },
  { cat: "法律・倫理", q: "生成AIが作成したコンテンツの著作権について、日本の現行法での扱いはどれか？", a: "AIが自律的に生成したコンテンツは人間の創作物でないため、原則として著作権が発生しない。", choices: ["AIが自律的に生成したものは原則著作権が発生しない", "AIを利用した会社が常に著作権を持つ", "AIが生成したものはすべてパブリックドメインになる", "AIの開発者（OpenAI等）が著作権を持つ"], correct: 0, exp: "ただし人間が創意工夫を加えてAIを道具として使った場合は、人間の著作物として保護される可能性があります。" },
  { cat: "法律・倫理", q: "「個人情報保護法（日本）」においてAIで個人情報を処理する際に必要なことはどれか？", a: "利用目的の特定・明示、第三者提供の制限、要配慮個人情報（病歴・信条等）の取り扱いには原則として本人同意が必要。", choices: ["利用目的の明示・第三者提供制限・要配慮情報には同意取得が必要", "AIで処理する場合は個人情報保護法が適用されない", "匿名化せずに学習データとして利用できる", "海外に送信する場合のみ規制が適用される"], correct: 0, exp: "2022年改正で外国への個人情報移転規制も強化されました。AI活用時は個人情報の取り扱いに細心の注意が必要です。" },
  { cat: "法律・倫理", q: "「AIの倫理原則」としてOECDが提唱する概念に含まれないものはどれか？", a: "「AIの完全自律化の推進」はOECD原則に含まれない。人間中心・透明性・堅牢性・セキュリティ・説明責任が原則。", choices: ["AIの完全自律化の推進", "人間中心の価値観", "透明性と説明可能性", "堅牢性とセキュリティ"], correct: 0, exp: "OECD AI原則（2019年）はG20にも採択されました。「人間による監督・制御可能性」が重要な原則のひとつです。" },
  { cat: "法律・倫理", q: "「AIガバナンス」とはどのような概念か？", a: "AIシステムの開発・運用・利用が社会的に望ましい方向で行われるよう、組織・制度・技術的な仕組みを整備・管理すること。", choices: ["AIの開発・運用が社会的に望ましい方向で行われるよう管理・整備する仕組み", "AI技術者の採用・人事管理のプロセス", "AIモデルの重みパラメータを管理すること", "AIサーバーのクラウド費用を管理すること"], correct: 0, exp: "経営層のコミット・ポリシー策定・リスク評価・監査・インシデント対応などがAIガバナンスの構成要素です。" },
  { cat: "法律・倫理", q: "「AIウォッシング（AI Washing）」とはどのような行為か？", a: "AI技術の能力・倫理性・安全性を実態以上に誇張して宣伝したり、AI活用を偽ったりするマーケティング行為。", choices: ["AI技術の実態を誇張したり安全性を偽ったりするマーケティング行為", "AIが生成した文章を人間が書いたと偽る行為", "AIモデルの学習データをクリーニングする行為", "AIサービスを低価格で提供する行為"], correct: 0, exp: "「AI搭載」と謳いながら実態は単純な自動化だったり、「バイアスフリー」と宣伝しながら差別的な出力をするケースが問題になっています。" },
  { cat: "法律・倫理", q: "「AI説明可能性（XAI）」が重要な場面はどれか？", a: "医療診断・与信判断・採用選考など、AIの判断結果が人の権利・生命・生活に影響する高リスクな意思決定場面。", choices: ["医療診断・与信・採用など人の権利に影響する高リスクな判断場面", "ゲームAIが次の手を選ぶ場面", "スパムメールをフィルタリングする場面", "音楽ストリーミングで曲を推薦する場面"], correct: 0, exp: "EU AI法でも高リスクAIには説明可能性が義務付けられます。「なぜその判断をしたか」を示せることが信頼の根拠になります。" },

  { cat: "社会・ビジネス", q: "「AIリテラシー」とはどのような能力を指すか？", a: "AIの仕組み・できること・できないこと・リスクを理解し、適切に活用・評価・批判的に判断できる能力。", choices: ["AIの仕組みとリスクを理解し適切に活用・批判的に判断できる能力", "AIのプログラミングができる専門技術者の能力", "AIを使わずに仕事できる能力", "AIの代わりに人間が高速で計算できる能力"], correct: 0, exp: "生成AIパスポートが目指す「生成AIリテラシー」も、AIを正しく使いこなし社会で活躍できる能力の習得を目標にしています。" },
  { cat: "社会・ビジネス", q: "「生成AIパスポート」資格を認定する団体はどこか？", a: "一般社団法人生成AI活用普及協会（GUGA：ぐーが）。生成AIリテラシーの普及を目的とした民間認定資格。", choices: ["一般社団法人生成AI活用普及協会（GUGA）", "経済産業省", "一般社団法人日本ディープラーニング協会（JDLA）", "情報処理推進機構（IPA）"], correct: 0, exp: "GUGAは生成AIに関する正しい知識の普及と、AI活用人材の育成を目的として設立された協会です。" },
  { cat: "社会・ビジネス", q: "「JDLA（日本ディープラーニング協会）」が実施する資格試験はどれか？", a: "G検定（ジェネラリスト向け・AI知識）とE資格（エンジニア向け・深層学習実装）の2種類。", choices: ["G検定（AI知識）とE資格（深層学習実装）", "ITパスポートとFE試験", "生成AIパスポートとAI白書検定", "統計検定とデータサイエンス検定"], correct: 0, exp: "G検定はAIの知識・活用を問うビジネスパーソン向け。E資格は深層学習のエンジニア向け実装力を問います。" },
  { cat: "社会・ビジネス", q: "「責任あるAI（Responsible AI）」の実践に含まれる取り組みはどれか？", a: "公平性・透明性・プライバシー保護・説明可能性・安全性・説明責任の確保を組み込んだAI開発・運用の実践。", choices: ["公平性・透明性・プライバシー・安全性・説明責任を組み込んだ開発運用", "収益最大化を最優先とした開発", "競合他社より早くリリースすることを最優先した開発", "社内のAI専門家のみが意思決定するプロセス"], correct: 0, exp: "MicrosoftやGoogleも「Responsible AI」原則を公開しています。ビジネスの持続可能性にも直結する重要な概念です。" },
  { cat: "社会・ビジネス", q: "「デジタルデバイド」とAI普及の関係として正しいのはどれか？", a: "AIリテラシーや技術アクセスの格差により、AIを使いこなせる人とそうでない人の経済的・社会的格差がさらに拡大するリスクがある。", choices: ["AIリテラシー格差により経済・社会的格差がさらに拡大するリスクがある", "AI普及によりデジタルデバイドは完全に解消される", "AIは高齢者や障がい者にとって利用しやすくデバイドを縮小させる", "デジタルデバイドはAIとは無関係な問題"], correct: 0, exp: "包括的なAI教育・低コストなアクセス環境の整備が格差拡大を防ぐために重要です。" },

  { cat: "セキュリティ", q: "「ジェイルブレイク（Jailbreak）」とは生成AIにおいて何を指すか？", a: "AIの安全フィルター・倫理ガイドラインを回避するよう設計された特殊なプロンプトや手法。有害コンテンツ生成などに悪用される。", choices: ["AIの安全フィルターを回避して有害コンテンツを生成させる手法", "AIモデルをオープンソースとして公開する行為", "スマートフォンのOSを改造する行為", "AIのAPIを無制限に利用する行為"], correct: 0, exp: "「DAN（Do Anything Now）」などが有名。AIプロバイダーはジェイルブレイク対策を常にアップデートしています。" },
  { cat: "セキュリティ", q: "生成AIサービス利用時に「機密情報・個人情報の入力」を避けるべき理由は？", a: "入力データがサービス改善のための学習データとして利用される場合があり、情報が漏洩・外部公開されるリスクがあるため。", choices: ["学習データとして利用・漏洩されるリスクがあるため", "機密情報を入力するとAIの回答精度が下がるため", "個人情報を入力すると法律で罰せられるため", "AIが個人情報を記憶して他のユーザーに教えてしまうため"], correct: 0, exp: "企業ポリシーで「業務上の機密・顧客情報の入力禁止」を定めることが標準的な対策です。" },
  { cat: "セキュリティ", q: "「AIモデルの透かし（Watermarking）」技術の目的はどれか？", a: "AI生成コンテンツに人間には知覚できない識別情報を埋め込み、AIが生成したものかどうかを検証できるようにする技術。", choices: ["AI生成コンテンツに識別情報を埋め込みAI生成か否かを検証できるようにする", "著作権保護のために画像に目に見えるロゴを入れる技術", "AIモデルのコピーを防ぐためにモデルを暗号化する技術", "AIサービスの利用料金を透明化する技術"], correct: 0, exp: "ディープフェイク対策やフェイクニュース検出への活用が期待されています。OpenAIやGoogleも開発に取り組んでいます。" },

  { cat: "最新動向", q: "「SLM（Small Language Model）」が注目される理由はどれか？", a: "LLMより小規模なため、スマートフォン・エッジデバイスでのローカル動作が可能で、コスト・プライバシー面でメリットがある。", choices: ["スマホ・エッジデバイスで動作可能でコスト・プライバシー面でメリットがある", "LLMより高い精度で複雑な推論ができるから", "インターネット不要で大規模なデータを処理できるから", "規制当局の審査が不要だから"], correct: 0, exp: "MicrosoftのPhi・AppleのOn-Device AIなど、端末内で動作するSLMの実用化が進んでいます。" },
  { cat: "最新動向", q: "「マルチエージェントシステム」とはどのような仕組みか？", a: "複数のAIエージェントが役割分担・協調・競争しながら複雑なタスクを処理するシステム。", choices: ["複数のAIエージェントが役割分担・協調して複雑なタスクを処理するシステム", "1つのAIが複数のユーザーに同時対応するシステム", "複数の言語モデルを並列に実行するシステム", "複数のGPUクラスタでモデルを分散学習するシステム"], correct: 0, exp: "調査エージェント・コーディングエージェント・レビューエージェントが協調するなど、複雑な業務の自動化に活用されます。" },
  { cat: "最新動向", q: "「テキスト・トゥ・ビデオ（Text-to-Video）」生成AIの代表的なサービスはどれか？", a: "Sora（OpenAI）・Runway・Pika・Veoなど。テキスト説明から動画を生成できる生成AI。", choices: ["Sora（OpenAI）・Runway・Pika などテキストから動画を生成するAI", "Stable Diffusion（テキストから静止画を生成）", "Whisper（音声認識AI）", "DALL-E（テキストから画像生成）"], correct: 0, exp: "2024年にOpenAIがSoraを発表し話題に。映像制作・広告・エンタメ分野への影響が注目されています。" },
  { cat: "最新動向", q: "「オープンソースモデル」と「クローズドモデル」の違いとして正しいのはどれか？", a: "オープンソースは重みが公開され自由に改変・展開できる（例：LLaMA）。クローズドはAPIのみ提供で重みは非公開（例：GPT-4）。", choices: ["オープンは重みが公開・自由改変可能、クローズドはAPIのみ重み非公開", "オープンソースは無料、クローズドは有料という違いのみ", "オープンソースは高精度、クローズドは低精度という違い", "オープンソースは日本語非対応、クローズドは多言語対応という違い"], correct: 0, exp: "オープンソースはカスタマイズ自由・プライバシー保護のオンプレ展開が可能。クローズドは高性能だが依存リスク・コストがある。" },
  { cat: "最新動向", q: "「AIの冬（AI Winter）」とは何を指す歴史的な用語か？", a: "AI研究への期待が高まった後、技術的限界・資金不足・失望などから研究投資が大幅に縮小した時期（1970年代・1980年代後半）。", choices: ["AI研究への期待後に失望から投資が縮小した時期（1970年代・1980年代後半）", "冬季に限定して動作するAIシステムの総称", "AI企業の株価が下落した2022年の時期", "AIモデルの計算速度が遅かった1990年代"], correct: 0, exp: "AIは「ブームと冬」を繰り返してきた歴史があります。深層学習の台頭（2010年代）以降は継続的な発展が続いています。" },
];

// ────────────────────────────────
let mode = 'flash';
let currentCat = 'すべて';
let filteredQ = [];
let fcIndex = 0;
let quizQueue = [];
let quizIndex = 0;
let qCorrect = 0;
let qWrong = 0;
let answered = false;

const CATS = ['すべて', ...new Set(ALL_QUESTIONS.map(q => q.cat))];

function init() {
  // Build category buttons
  const row = document.getElementById('categoryRow');
  row.innerHTML = '';
  CATS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (c === currentCat ? ' active' : '');
    btn.textContent = c;
    btn.onclick = () => selectCat(c);
    row.appendChild(btn);
  });
  applyFilter();
}

function selectCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach((b, i) => {
    b.classList.toggle('active', CATS[i] === cat);
  });
  applyFilter();
}

function applyFilter() {
  filteredQ = currentCat === 'すべて' ? [...ALL_QUESTIONS] : ALL_QUESTIONS.filter(q => q.cat === currentCat);
  if (mode === 'flash') {
    fcIndex = 0;
    renderFlash();
  } else {
    startQuiz();
  }
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && m === 'flash') || (i === 1 && m === 'quiz'));
  });
  document.getElementById('flashMode').style.display = m === 'flash' ? 'block' : 'none';
  document.getElementById('quizMode').style.display = m === 'quiz' ? 'block' : 'none';
  applyFilter();
}

// ──── FLASHCARD ────
function renderFlash() {
  if (!filteredQ.length) return;
  const q = filteredQ[fcIndex];
  document.getElementById('fcQuestion').textContent = q.q;
  document.getElementById('fcAnswer').textContent = q.a;
  // reset flip
  document.getElementById('flashcard').classList.remove('flipped');
  updateStats(fcIndex + 1, filteredQ.length, q.cat);
}

function flipCard() {
  document.getElementById('flashcard').classList.toggle('flipped');
}

function fcNav(dir) {
  fcIndex = (fcIndex + dir + filteredQ.length) % filteredQ.length;
  renderFlash();
}

function shuffle() {
  filteredQ.sort(() => Math.random() - 0.5);
  fcIndex = 0;
  renderFlash();
}

// ──── QUIZ ────
function startQuiz() {
  quizQueue = [...filteredQ].sort(() => Math.random() - 0.5);
  quizIndex = 0;
  qCorrect = 0;
  qWrong = 0;
  answered = false;
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('quizCard').style.display = 'block';
  updateScoreBadge();
  renderQuiz();
}

function renderQuiz() {
  if (quizIndex >= quizQueue.length) {
    showResult();
    return;
  }
  const q = quizQueue[quizIndex];
  answered = false;
  document.getElementById('quizQNum').textContent = `問題 ${quizIndex + 1} / ${quizQueue.length}`;
  document.getElementById('quizQuestion').textContent = q.q;
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('btnNextQ').classList.remove('show');

  // Shuffle choices
  const indices = [0,1,2,3].sort(() => Math.random() - 0.5);
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  const labels = ['A','B','C','D'];
  indices.forEach((origIdx, pos) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-label">${labels[pos]}</span>${q.choices[origIdx]}`;
    btn.onclick = () => selectChoice(origIdx === q.correct, btn, origIdx, q);
    choicesEl.appendChild(btn);
  });
  updateStats(quizIndex + 1, quizQueue.length, q.cat);
}

function selectChoice(isCorrect, btn, chosenIdx, q) {
  if (answered) return;
  answered = true;

  // Mark all buttons
  const allBtns = document.querySelectorAll('.choice-btn');
  allBtns.forEach((b, i) => {
    const text = b.textContent.replace(/^[ABCD]/, '').trim();
    const origIdx = [...Array(4)].findIndex((_, j) => q.choices[j] === text);
    if (origIdx === q.correct) b.classList.add('correct');
    b.disabled = true;
  });
  if (!isCorrect) {
    btn.classList.add('wrong');
    qWrong++;
  } else {
    qCorrect++;
  }

  document.getElementById('explanation').innerHTML = `<strong>${isCorrect ? '✅ 正解！' : '❌ 不正解'}</strong><br>${q.exp}`;
  document.getElementById('explanation').classList.add('show');
  document.getElementById('btnNextQ').classList.add('show');
  updateScoreBadge();
}

function nextQuestion() {
  quizIndex++;
  renderQuiz();
}

function updateScoreBadge() {
  document.getElementById('qCorrect').textContent = qCorrect;
  document.getElementById('qWrong').textContent = qWrong;
}

function showResult() {
  document.getElementById('quizCard').style.display = 'none';
  const total = quizQueue.length;
  const pct = Math.round(qCorrect / total * 100);
  document.getElementById('resultScore').textContent = `${pct}%`;
  document.getElementById('resultTotal').textContent = `${qCorrect} / ${total} 問正解`;
  let msg = pct >= 80 ? '🎉 素晴らしい！合格圏内です！' :
            pct >= 60 ? '📚 もう少し！苦手分野を復習しよう' :
            '💪 基礎から復習しよう！諦めないで！';
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultScreen').classList.add('show');
  document.getElementById('statsLeft').textContent = `${qCorrect} / ${total}`;
  document.getElementById('progressBar').style.width = pct + '%';
}

function retryQuiz() {
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('quizCard').style.display = 'block';
  startQuiz();
}

function updateStats(cur, total, cat) {
  document.getElementById('statsLeft').textContent = `${cur} / ${total}`;
  document.getElementById('progressBar').style.width = (cur / total * 100) + '%';
  document.getElementById('statsRight').textContent = cat;
}

init();
</script>
</body>
</html>
